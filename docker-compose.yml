version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: pgmanage_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: pgmanage
      POSTGRES_PASSWORD: pgmanage_dev_password
      POSTGRES_DB: pgmanage
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pgmanage -d pgmanage"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: pgmanage_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass redis_dev_password
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis_dev_password", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  localstack:
    image: localstack/localstack:latest
    container_name: pgmanage_localstack
    restart: unless-stopped
    ports:
      - "4566:4566"
    environment:
      SERVICES: s3,sqs,ses,secretsmanager
      EDGE_PORT: 4566
      AWS_DEFAULT_REGION: ap-south-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      PERSISTENCE: 1
    volumes:
      - localstack_data:/var/lib/localstack
      - /var/run/docker.sock:/var/run/docker.sock

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
      target: development
    container_name: pgmanage_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      localstack:
        condition: service_started
    environment:
      ENVIRONMENT: local
      DATABASE_URL: postgresql+asyncpg://pgmanage:pgmanage_dev_password@postgres:5432/pgmanage
      REDIS_URL: redis://:redis_dev_password@redis:6379/0
      AWS_ENDPOINT_URL: http://localstack:4566
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_REGION: ap-south-1
      S3_BUCKET_NAME: pgmanage-dev
      SECRET_KEY: dev-secret-key-not-for-production-use
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      CORS_ORIGINS: '["http://localhost:3000","http://localhost:3001"]'
    ports:
      - "8000:8000"
    volumes:
      - ./apps/backend:/app
      - /app/__pycache__
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --log-level debug

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile.dev
    container_name: pgmanage_web
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:8000/api/v1
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web:/app
      - /app/node_modules

volumes:
  pgdata:
  redis_data:
  localstack_data:

networks:
  default:
    name: pgmanage_network
